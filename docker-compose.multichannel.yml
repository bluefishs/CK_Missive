# =============================================================================
# ⚠️ DEPRECATED — ADR-0014 (2026-04-14)
# =============================================================================
# OpenClaw 已由 Hermes Agent 取代。本檔保留供參考，不再使用。
# Hermes 部署方式見: CK_AaaP/runbooks/hermes-stack/docker-compose.yml
#
# 歸檔日期: 2026-05-12 後可刪除
# =============================================================================
#
# 原功能:
#   LINE/Telegram → OpenClaw Gateway → ck-missive-bridge skill
#   → POST http://host.docker.internal:8001/api/ai/agent/query
#
# 替代方案:
#   LINE/Telegram → Hermes Agent Gateway → ck-missive-bridge skill
#   → POST http://host.docker.internal:8001/api/ai/agent/query_sync
# =============================================================================

name: ck_multichannel

services:
  # OpenClaw 服務已停用 (ADR-0014)
  # Hermes Agent 已接管 Telegram/LINE 通道
  openclaw:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    container_name: ck_openclaw
    profiles: ["deprecated"]  # 不會被 docker compose up 啟動
    restart: "no"
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-C:/Users/User1/.openclaw}:/home/node/.openclaw
    environment:
      - OPENCLAW_GATEWAY_PORT=18789
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ck_infra

networks:
  ck_infra:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_default
