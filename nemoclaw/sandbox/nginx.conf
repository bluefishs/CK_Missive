server {
    listen 80;
    server_name localhost;

    # NemoClaw 監控塔 — 沙箱策略 API
    location /api/policy {
        alias /etc/nemoclaw/sandbox/;
        default_type application/yaml;
    }

    location /api/config {
        alias /etc/nemoclaw/config/;
        default_type application/yaml;
    }

    location /api/agents {
        alias /etc/nemoclaw/agents/;
        default_type text/markdown;
    }

    # 健康檢查
    location / {
        return 200 '{"status":"healthy","service":"NemoClaw Tower","version":"1.0.0"}';
        default_type application/json;
    }
}
