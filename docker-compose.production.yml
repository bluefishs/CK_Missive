# =============================================================================
# CK_Missive Production 部署配置 (QNAP NAS Container Station)
# =============================================================================
# 目標: 192.168.50.41 NAS Container Station
#
# 部署流程:
#   1. 複製 .env.production.example 為 .env.production
#   2. 執行部署前檢查: scripts/deploy/pre-deploy.sh (或 .ps1)
#   3. 建置並啟動: docker compose -f docker-compose.production.yml up -d --build
#   4. 全新部署需初始化資料庫 (v2.0, 2026-05-21：scripts 移至 app/scripts/ 內 image)：
#      docker compose exec backend python -m app.scripts.init_database
#      docker compose exec backend alembic stamp heads
#
# 常用命令:
#   - 查看狀態: docker compose -f docker-compose.production.yml ps
#   - 查看日誌: docker compose -f docker-compose.production.yml logs -f
#   - 重建服務: docker compose -f docker-compose.production.yml up -d --build --force-recreate
#   - 停止服務: docker compose -f docker-compose.production.yml down
# =============================================================================

name: ck_missive_prod

services:
  # --- 🗄️ PostgreSQL 資料庫 ---
  postgres:
    image: pgvector/pgvector:0.8.0-pg15
    container_name: ck_missive_postgres
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: Asia/Taipei
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./configs/postgresql-tuning.conf:/etc/postgresql/tuning.conf:ro
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_lock_waits=on"
      - "-c"
      - "log_temp_files=0"
      - "-c"
      - "default_statistics_target=200"
      - "-c"
      - "timezone=Asia/Taipei"
    networks:
      - ck_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- ⚡ Redis 快取 ---
    labels:
      com.ck.service: ck_missive_db
      com.ck.version: 1.0.0
  redis:
    image: redis:7-alpine
    container_name: ck_missive_redis
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: redis-server --appendonly yes
    environment:
      TZ: Asia/Taipei
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - ck_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- 🐍 FastAPI 後端 ---
    labels:
      com.ck.service: ck_missive_redis
      com.ck.version: 1.0.0
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ck-missive-backend:production
    container_name: ck_missive_backend
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      # L49 (2026-05-27): backup service 從 docker CLI subprocess 改 pg_dump 直連
      # 需顯式宣告 POSTGRES_HOST/PORT，container 內走 docker network 名 = postgres:5432
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DEBUG=false
      - LOG_LEVEL=INFO
      - TZ=Asia/Taipei
      - ENVIRONMENT=production
      # 2026-05-24 fix: 修正 docker 內 PROJECT_ROOT 偏層問題（docker /app vs host backend/）
      # 沒這個 → memory_metrics_refresh_job 找 /wiki/memory 找不到 → silent skip → gauge 永遠 0
      - CK_WIKI_DIR=/app/wiki
      # v6.12 (2026-05-30) Pipeline silent dormant 修法配套：paths.py 內 PROJECT_ROOT 用此 env override
      # parents[3] 算法 container 內得到 / (root)，導致 WIKI_DIR=/wiki 但實際 mount /app/wiki
      # 揭發: 5/28-5/30 optimization_pipeline silent 寫 /wiki Permission denied
      - CK_PROJECT_ROOT=/app
      # L48 (2026-05-27): SSO env 必須 declare 進 container，否則 sso_bridge.py 看 CK_SSO_ENABLED=False
      # → 503 "SSO bridge 未啟用"（前 backend container 跑著的 env 來自 image build cache，
      #   recreate 後 image cache 失效就沒 env，這是 L48 修拓樸的 prerequisite 配套）
      - CK_SSO_ENABLED=${CK_SSO_ENABLED:-true}
      - CK_SSO_JWT_SECRET=${CK_SSO_JWT_SECRET}
      - CK_SSO_JWKS_URL=${CK_SSO_JWKS_URL:-https://www.cksurvey.tw/.well-known/jwks.json}
      # L48 (2026-05-27): production yml 硬編 false 不從 .env 取（.env 設 true 給本機 dev）
      # backend main.py:97 SECURITY HALT: DEVELOPMENT_MODE=true + cksurvey.tw hosts → sys.exit(1)
      - DEVELOPMENT_MODE=false
      - AUTH_DISABLED=false
      # L51 (2026-05-29) ADR-0046 Phase 4 配套：LINE_* env 注入 container
      # 揭發事故：business_recommendation cron 5/29 09:00 跑 6 筆全 silent push False
      # 真因：host .env 有 LINE_ADMIN_USER_ID/CHANNEL_TOKEN 但 compose 未注入 container
      # 由 L51 task B tender_recommendation_history.error_msg 揭發（觀測閉環價值體現）
      - LINE_BOT_ENABLED=${LINE_BOT_ENABLED:-false}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET:-}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN:-}
      - LINE_ADMIN_USER_ID=${LINE_ADMIN_USER_ID:-}
      - LINE_SUBSCRIBE_TOKEN=${LINE_SUBSCRIBE_TOKEN:-}
      - LINE_LOGIN_CHANNEL_ID=${LINE_LOGIN_CHANNEL_ID:-}
      - LINE_LOGIN_CHANNEL_SECRET=${LINE_LOGIN_CHANNEL_SECRET:-}
      - LINE_LOGIN_REDIRECT_URI=${LINE_LOGIN_REDIRECT_URI:-}
      # L51.2 (2026-05-29) OA-3 PM2 廢除影響範圍補全：29 個 env vars (host .env vs compose diff)
      # 同型事故防範 — code 讀 + host .env 有 + compose 沒注入 = silent fail 風險
      # --- Google OAuth (v6.12 2026-05-30 修 L51 family 同型 silent fail) ---
      # 揭發: fitness step 1 container_env_alignment_audit RED 偵測
      # host .env 有 GOOGLE_CLIENT_ID/SECRET 但 compose 未注入 → Google 登入 silent 503
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # --- AI 推理 fallback (GROQ/NVIDIA/OLLAMA/VLLM) ---
      - AI_ENABLED=${AI_ENABLED:-true}
      - AI_DEFAULT_MODEL=${AI_DEFAULT_MODEL:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_DAILY_REQ_LIMIT=${GROQ_DAILY_REQ_LIMIT:-}
      - GROQ_SKIP_PROMPT_CHARS=${GROQ_SKIP_PROMPT_CHARS:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_MONTHLY_CRED_LIMIT=${NVIDIA_MONTHLY_CRED_LIMIT:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      - VLLM_API_KEY=${VLLM_API_KEY:-}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-}
      - VLLM_ENABLED=${VLLM_ENABLED:-false}
      - VLLM_MODEL=${VLLM_MODEL:-}
      # --- LLM quota / cost 警報 ---
      - LLM_QUOTA_WARN_PCT=${LLM_QUOTA_WARN_PCT:-}
      - TOKEN_DAILY_COST_USD_LIMIT=${TOKEN_DAILY_COST_USD_LIMIT:-}
      # --- Telegram 多通道 fallback (ADR-0027 後永封但服務仍 init) ---
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-false}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}
      - TELEGRAM_ADMIN_PUSH_ENABLED=${TELEGRAM_ADMIN_PUSH_ENABLED:-false}
      - TELEGRAM_WEBHOOK_BASE_URL=${TELEGRAM_WEBHOOK_BASE_URL:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      # --- Discord 多通道 fallback ---
      - DISCORD_BOT_ENABLED=${DISCORD_BOT_ENABLED:-false}
      # --- Shadow Logger (Hermes baseline) ---
      - SHADOW_ENABLED=${SHADOW_ENABLED:-false}
      - SHADOW_RETENTION_DAYS=${SHADOW_RETENTION_DAYS:-}
      - SHADOW_SAMPLE_RATIO=${SHADOW_SAMPLE_RATIO:-}
      # --- Morning report 故事化包裝 ---
      - MORNING_REPORT_NARRATIVE_ENABLED=${MORNING_REPORT_NARRATIVE_ENABLED:-true}
      - MORNING_REPORT_NARRATIVE_TIMEOUT=${MORNING_REPORT_NARRATIVE_TIMEOUT:-}
      # --- MCP service token (OA-1 待辦補完) + Tunnel 守衛 ---
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN:-}
      - TUNNEL_GUARD_ENABLED=${TUNNEL_GUARD_ENABLED:-false}
    ports:
      - "8001:8001"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      # L49 (2026-05-27): 修正 backup mount 路徑分離（admin/backup 看不到歷史 41 entries + 6 個 SQL）
      # 歷史備份檔/log 從 PM2 native 模式以來都寫在 project_root（不是 backend/）：
      #   - host ./backups/database/*.sql （6 個歷史 + PREUPGRADE dump）
      #   - host ./logs/backup/backup_operations.json （41 entries 從 2026-01-29 起）
      # backup_utils._init_utils 邏輯：self.project_root = Path("/app") (container 內偵測 /app/main.py)
      # → backup_dir = /app/backups/database / log_dir = /app/logs/backup
      # 修法：mount project_root 的 backups + logs/backup 到 container /app 對應位置
      # （取代舊的 ./backend/backups:/backups + ./backend/backup-logs:/logs，那兩條路徑都對不到歷史資料）
      - ./backups:/app/backups
      - ./logs/backup:/app/logs/backup
      # L49.5 (2026-05-28): mount backend/config 讓 remote_backup.json 等
      # 設定檔變更可持久化（不再寫到 container layer restart 蝕掉）
      # owner 透過 admin/backup UI 改異地備份路徑 → 寫 /app/config/remote_backup.json
      # → 對應 host backend/config/remote_backup.json → restart 後保留
      - ./backend/config:/app/config
      - ./backend/GoogleCalendarAPIKEY.json:/app/GoogleCalendarAPIKEY.json:ro
      # 2026-05-24 fix: mount wiki/ 讓 memory_metrics_refresh_job 能讀 diary/proposals/crystals
      # 沒這個 mount → scheduler 每 15min warn「wiki/memory 目錄不存在，skip metrics refresh」
      # → memory_diary_days_total Prometheus gauge 永遠 0 → self_diagnosis 看到 hollow
      # PROJECT_ROOT 在 paths.py 設為 /app 上一層，但 docker container 內 /app 是 backend/
      # 所以 wiki 必須 mount 到 /app/wiki（與 host wiki/ 對齊）
      - ./wiki:/app/wiki
      # L48 (2026-05-27): mount host frontend dist 給 container 內 backend SPA fallback
      # backend main.py:983 _FRONTEND_DIST = Path(__file__).resolve().parent.parent / "frontend" / "dist"
      # = /frontend/dist in container (WORKDIR=/app, parent.parent=/)
      # 修法前此 path 不存在 → SPA fallback disabled → cloudflared route to backend 看到 API JSON not HTML
      # 修法後 backend 同時 serve SPA + API，解 5/21 以來 missive 卡 login 真因
      - ./frontend/dist:/frontend/dist:ro
      # L51.7 Sprint 2.P1.8 (2026-05-30): mount scripts/ 給 synthetic_baseline / shadow_export 等 cron 跑
      # 揭發: PROJECT_ROOT=/ in container, synthetic_baseline_inject_job 找 /scripts/checks/synthetic-baseline-inject.py
      # 不存在 → silent return → shadow_baseline 24h n=0 → fitness step 58 RED
      # v6.12 (2026-05-30 PM): CK_PROJECT_ROOT=/app override 後 PROJECT_ROOT/scripts = /app/scripts
      # 必須改 mount target 對齊（先前 /scripts 已無人讀取 → 同型 L43 跨檔 SSOT 漂移）
      - ./scripts:/app/scripts:ro
    networks:
      ck_network: {}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --- ⚛️ React 前端 (Nginx) ---
    labels:
      com.ck.service: ck_missive_backend
      com.ck.version: 1.0.0
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # additional_contexts (Compose v2.6+): inject CKProject root's shared-modules
      # so vite alias '@ck-shared/ui-components' (resolves to ../../shared-modules/ui-components)
      # has its target reachable inside the builder stage.
      additional_contexts:
        shared-modules: ../shared-modules
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_AUTH_DISABLED=false
    image: ck-missive-frontend:production
    container_name: ck_missive_frontend
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=Asia/Taipei
    ports:
      - "3000:80"
    networks:
      - ck_network
    depends_on:
      backend:
        condition: service_healthy
    # L45 fix: align with Dockerfile HEALTHCHECK (nginx listens :3000 not :80)
    # nginx.conf has /nginx-health fast 200 endpoint; use 127.0.0.1 to avoid IPv6 ::1 issue
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- 🔧 Adminer (資料庫管理，可選) ---
    labels:
      com.ck.service: ck_missive_frontend
      com.ck.version: 1.0.0
  adminer:
    image: adminer:4.8.1
    container_name: ck_missive_adminer
    restart: unless-stopped
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
      - TZ=Asia/Taipei
    ports:
      - "8080:8080"
    networks:
      - ck_network
    depends_on:
      - postgres
    profiles:
      - tools

# --- 📦 持久化儲存 ---
# 2026-05-21 事故修正：production compose 原指向 ck_missive_postgres_data（空殼，17 tables/502 docs）
# 真實資料一直在 ck_missive_postgres_dev_data（75 tables/1788 docs，最後更新 2026-05-20 15:18）
# 詳見 backup/incident_20260521_volume_mount_drift/ 與 lesson L43
    labels:
      com.ck.service: ck_missive_adminer
      com.ck.version: 1.0.0
volumes:
  postgres_data:
    name: ck_missive_postgres_dev_data
    external: true
  redis_data:
    name: ck_missive_redis_data

# --- 🌐 網路 ---
networks:
  ck_network:
    name: ck_missive_network
    driver: bridge
  # nemoclaw_network: 已移除 (ADR-0015, 2026-04-16)
