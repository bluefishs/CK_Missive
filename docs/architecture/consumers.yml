# ---------------------------------------------------------------------------
# 範本資產的「最低相容 consumer 版本」聲明
# ---------------------------------------------------------------------------
#
# 當 source 升 Major bump 時，列「最低需 consumer 升到 vN.M」
# notify-consumers.py 可據此提醒
asset_compatibility:
  "CK_Missive#run_fitness_v3.0":
    requires_consumer_features: ["python>=3.10", "bash>=4"]
    breaking_from: null  # 首版

  "CK_Missive#dead_ui_detector_v1.0":
    requires_consumer_features: ["FastAPI router pattern", "axios baseURL frontend"]
    notes: "若 consumer 不用 axios（如純 fetch），需自己改 path normalize"

  "CK_Missive#agent_evolution_health_v1.0":
    requires_consumer_features: ["asyncpg", "redis", "agent_evolution_history table"]
    notes: "consumer 若無 agent system，可整段略過此 detector"

