# Consumer Registry — 引用 CK_Missive 範本資產的 repo 清單
#
# 用途：
#   1. notify-consumers.py (v6.0 規劃) 讀取此檔，diff 各 consumer 範本版本
#   2. owner 月度跑 lessons_drift_check 後可逐個提醒 consumer 升級
#   3. 文件治理 — 一處查詢「誰用了我的範本」
#
# 維護準則：
#   - 新 consumer 採用範本即註冊（commit 入此檔）
#   - 升級後 update 該 consumer 的 versions 段
#   - 若 consumer 不再使用 → 改 status: archived（不刪，保歷史）
#
# 跨 repo 引用 FQID: CK_Missive#consumers_v1.0
# 關聯: docs/architecture/CROSS_REPO_REFERENCE_GUIDE.md §4.3

version: 1.0
updated: 2026-04-28

