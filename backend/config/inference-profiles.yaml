# Inference Provider Profiles (inspired by NemoClaw)
# Environment variables (${VAR}) are resolved at load time.
# See: app/services/ai/ai_config.py for usage.
#
# v2.0.0 — Gemma 4 as primary local model (replaces Qwen2.5-7B vLLM)
version: "2.0.0"

profiles:
  # === P2: 本地備援 — Gemma 4 (Ollama GPU) ===
  # 2026-04-18: model tag 從 "gemma4" 修正為 "gemma4:e2b"（Ollama 實際註冊名）
  # priority 從 0→2：Groq/NVIDIA 雲端設為主力（P1），Ollama 作備援
  gemma4-local:
    provider: ollama
    model: "gemma4:e2b"
    base_url: "${OLLAMA_BASE_URL}"
    timeout_seconds: 120
    priority: 2
    capabilities:
      - chat
      - planning
      - synthesis
      - ner
      - multimodal
    note: "Gemma 4 8B Q4_K_M via Ollama GPU. ~6.7GB VRAM. Primary for all tasks including vision."

  # === 🆕 2026-04-24 Qwen 三路整合（零新成本 — Hermes 評估 docs/evaluations/qwen3-6-27b-hermes-primary.md）===

  # P2 本地：Qwen2.5 7B Q4 (Ollama GPU) — 繁中能力優於 Gemma 4 8B
  # 模型已下載（docker exec ck-ollama ollama list → qwen2.5:7b 4.7GB）
  qwen25-7b-local:
    provider: ollama
    model: "qwen2.5:7b"
    base_url: "${OLLAMA_BASE_URL}"
    timeout_seconds: 120
    priority: 2
    capabilities:
      - chat
      - planning
      - synthesis
      - ner
      - chinese-native
    note: "Qwen 2.5 7B Q4 via Ollama GPU. ~4.7GB VRAM. 繁中優於 Gemma 4。"

  # P2 本地長 context：Qwen2.5 7B 64K context（已預編）
  qwen25-7b-64k-local:
    provider: ollama
    model: "qwen2.5:7b-ctx64k"
    base_url: "${OLLAMA_BASE_URL}"
    timeout_seconds: 150
    priority: 2
    capabilities:
      - chat
      - planning
      - synthesis
      - ner
      - chinese-native
      - long-context
    note: "Qwen 2.5 7B with 64K context — 適用於 Hermes 長工具迴圈上下文。"

  # P1 雲端：Groq Qwen3-32B（免費 tier, 60 RPM 專用配額）
  # 2026-04-24 驗證：curl /v1/chat/completions 通過，模型已活化
  qwen3-32b-groq:
    provider: openai  # Groq OpenAI-compatible endpoint
    model: "qwen/qwen3-32b"
    api_key_env: GROQ_API_KEY  # 重用現有 Groq key（零新費用）
    base_url: "https://api.groq.com/openai/v1"
    timeout_seconds: 30
    priority: 1
    capabilities:
      - chat
      - planning
      - synthesis
      - function-calling
      - chinese-native
      - reasoning  # Qwen3 內建 thinking mode
    note: "Qwen3 32B dense via Groq Cloud free tier. 繁中 + agentic 首選。60 RPM / 14.4K RPD。"

  # === P1: 雲端回退 ===
  groq-cloud:
    provider: groq
    model: "${AI_DEFAULT_MODEL}"
    api_key_env: GROQ_API_KEY
    base_url: "https://api.groq.com/openai/v1"
    timeout_seconds: 30
    priority: 1
    capabilities:
      - chat
      - planning
      - synthesis

  nvidia-cloud:
    provider: openai
    model: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
    api_key_env: NVIDIA_API_KEY
    base_url: "https://integrate.api.nvidia.com/v1"
    timeout_seconds: 30
    priority: 1
    capabilities:
      - chat
      - planning
      - synthesis
      - ner
    note: "NVIDIA Cloud. Requires build.nvidia.com model activation."

  # P2 本地回退 = P0 同模型 (Gemma 4)，雲端回退由 Groq/NVIDIA P1 承接

  # === Vision — Gemma 4 multimodal (image understanding) ===
  gemma4-vision:
    provider: ollama
    model: "gemma4:e2b"
    base_url: "${OLLAMA_BASE_URL}"
    timeout_seconds: 120
    priority: 0
    capabilities:
      - vision
      - image_understanding
      - document_ocr
    note: "Gemma 4 native vision — invoice/document/asset image analysis"

  # === Embedding ===
  nvidia-embed:
    provider: openai
    model: "nvidia/llama-nemotron-embed-1b-v2"
    api_key_env: NVIDIA_API_KEY
    base_url: "https://integrate.api.nvidia.com/v1"
    timeout_seconds: 30
    purpose: embedding
    priority: 0
    capabilities:
      - embedding
    note: "NVIDIA 1B embedding model, 1024 dimensions."

  ollama-embed:
    provider: ollama
    model: "nomic-embed-text"
    base_url: "${OLLAMA_BASE_URL}"
    timeout_seconds: 30
    purpose: embedding
    priority: 1
    capabilities:
      - embedding

  # === 停用: vLLM Qwen (保留配置供切回) ===
  # vllm-local:
  #   provider: openai
  #   model: "${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}"
  #   api_key_env: VLLM_API_KEY
  #   base_url: "http://localhost:8000/v1"
  #   timeout_seconds: 60
  #   priority: 0
  #   capabilities: [chat, planning, synthesis, ner]
  #   note: "Disabled — VRAM shared with Gemma 4. To restore: uncomment + docker start ck_missive_vllm_dev"
