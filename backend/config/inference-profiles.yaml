# Inference Provider Profiles (inspired by NemoClaw)
# Environment variables (${VAR}) are resolved at load time.
# See: app/services/ai/ai_config.py for usage.
#
# v2.0.0 — Gemma 4 as primary local model (replaces Qwen2.5-7B vLLM)
version: "2.0.0"

profiles:
  # === P0: 本地主力 — Gemma 4 8B (Ollama GPU) ===
  gemma4-local:
    provider: ollama
    model: "gemma4"
    base_url: "${OLLAMA_BASE_URL}"
    timeout_seconds: 120
    priority: 0
    capabilities:
      - chat
      - planning
      - synthesis
      - ner
      - multimodal
    note: "Gemma 4 8B Q4_K_M via Ollama GPU. ~6.7GB VRAM. Primary for all tasks including vision."

  # === P1: 雲端回退 ===
  groq-cloud:
    provider: groq
    model: "${AI_DEFAULT_MODEL}"
    api_key_env: GROQ_API_KEY
    base_url: "https://api.groq.com/openai/v1"
    timeout_seconds: 30
    priority: 1
    capabilities:
      - chat
      - planning
      - synthesis

  nvidia-cloud:
    provider: openai
    model: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
    api_key_env: NVIDIA_API_KEY
    base_url: "https://integrate.api.nvidia.com/v1"
    timeout_seconds: 30
    priority: 1
    capabilities:
      - chat
      - planning
      - synthesis
      - ner
    note: "NVIDIA Cloud. Requires build.nvidia.com model activation."

  # P2 本地回退 = P0 同模型 (Gemma 4)，雲端回退由 Groq/NVIDIA P1 承接

  # === Vision — Gemma 4 multimodal (image understanding) ===
  gemma4-vision:
    provider: ollama
    model: "gemma4"
    base_url: "${OLLAMA_BASE_URL}"
    timeout_seconds: 120
    priority: 0
    capabilities:
      - vision
      - image_understanding
      - document_ocr
    note: "Gemma 4 native vision — invoice/document/asset image analysis"

  # === Embedding ===
  nvidia-embed:
    provider: openai
    model: "nvidia/llama-nemotron-embed-1b-v2"
    api_key_env: NVIDIA_API_KEY
    base_url: "https://integrate.api.nvidia.com/v1"
    timeout_seconds: 30
    purpose: embedding
    priority: 0
    capabilities:
      - embedding
    note: "NVIDIA 1B embedding model, 1024 dimensions."

  ollama-embed:
    provider: ollama
    model: "nomic-embed-text"
    base_url: "${OLLAMA_BASE_URL}"
    timeout_seconds: 30
    purpose: embedding
    priority: 1
    capabilities:
      - embedding

  # === 停用: vLLM Qwen (保留配置供切回) ===
  # vllm-local:
  #   provider: openai
  #   model: "${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}"
  #   api_key_env: VLLM_API_KEY
  #   base_url: "http://localhost:8000/v1"
  #   timeout_seconds: 60
  #   priority: 0
  #   capabilities: [chat, planning, synthesis, ner]
  #   note: "Disabled — VRAM shared with Gemma 4. To restore: uncomment + docker start ck_missive_vllm_dev"
