# Agent Policy Configuration (inspired by NemoClaw)
# Values here serve as defaults; environment variables always take priority.
# See: app/services/ai/ai_config.py for field mapping.
version: "1.0.0"

agent:
  max_iterations: 3
  tool_timeout_seconds: 15
  stream_timeout_seconds: 60
  sync_query_timeout_seconds: 90
  find_similar_threshold: 0.7

tool_monitor:
  window_size: 100
  degrade_threshold: 0.30
  recovery_threshold: 0.70
  probe_interval_seconds: 600
  auto_block_degraded: true
  degradation_threshold: 0.3    # block tools with <30% success rate
  recovery_check_interval: 300  # check every 5 minutes

pattern_learner:
  max_patterns: 500
  decay_half_life_seconds: 604800   # 7 days
  match_threshold: 0.6   # 調低讓更多模式命中跳過 LLM planning
  semantic_enabled: true
  semantic_threshold: 0.85
  semantic_top_k: 5

summarizer:
  trigger_turns: 6
  max_chars: 500
  keep_recent: 2

router:
  pattern_threshold: 0.6   # 調低配合 pattern_learner，讓更多重複查詢命中
  rule_threshold: 0.9

tool_guard:
  enabled: true

adaptive_fewshot:
  enabled: true
  limit: 5
  min_results: 1

self_reflection:
  enabled: true
  threshold: 5
  timeout_seconds: 5

memory:
  flush_enabled: true
  learnings_ttl_seconds: 86400    # 24 hours
  max_learnings: 10

learning:
  persist_enabled: true
  max_per_session: 10
  inject_limit: 5

compaction:
  tier1_timeout_seconds: 10
  tier2_max_msg_chars: 500
  tier3_topic_limit: 10

evolution:
  trigger_every_n_queries: 50
  trigger_interval_hours: 24
  # 模式升級: hit_count >= promote_min_hits AND success_rate >= promote_min_success
  promote_min_hits: 15
  promote_min_success: 0.90
  # 模式降級: hit_count >= 5 AND success_rate <= demote_max_success
  demote_max_success: 0.30
  # 信號批次處理上限
  signal_batch_size: 100

capability:
  # 能力評級閾值
  strong_threshold: 0.70
  weak_threshold: 0.50
  # Redis 快取 TTL (秒)
  cache_ttl_seconds: 300

# Provider routing preferences (v3.1.0 — 2026-04-24 qwen2.5 首選調整註記)
# Task types: chat, planning, synthesis, ner, multimodal, embedding
#
# 📌 2026-04-24 soul-fidelity 實測（docs/evaluations/qwen3-6-27b-hermes-primary.md 附錄 C）：
#    Ollama qwen2.5:7b 85% > Groq llama-3.3-70b 75%* > Ollama gemma4 70% > Groq qwen3-32b 50%
#
# 📌 OLLAMA_MODEL env 控制實際本地模型：
#    - gemma4:e2b（現況 default，prod .env 仍此值）
#    - qwen2.5:7b（推薦切換，零成本提升 15 pp，運維步驟見 docs/runbooks/hermes-model-swap.md）
#
# 📌 簡體避免規則（memory feedback_simplified_chinese_avoidance）：
#    原生簡體模型（qwen3-32b 等）必須 prompt 強制繁中 + OpenCC s2twp 雙保險
provider_routing:
  chat:
    preferred: [ollama, groq, nvidia]
    prefer_local: true
  planning:
    preferred: [ollama, groq, nvidia]
    prefer_local: true
  synthesis:
    preferred: [ollama, groq, nvidia]
    prefer_local: true
  ner:
    preferred: [ollama, nvidia, groq]
    prefer_local: true
  multimodal:
    preferred: [ollama]
    prefer_local: true
    note: "Gemma 4 vision/audio. Local only."
  embedding:
    preferred: [ollama]
    prefer_local: true
