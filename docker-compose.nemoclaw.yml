# =============================================================================
# NemoClaw 多容器架構
# =============================================================================
# 1 監控塔 (NemoClaw) + 1 通用引擎 (OpenClaw) + N 業務插件 (CK_*)
#
# 使用方式：
#   啟動全部:  docker compose -f docker-compose.nemoclaw.yml up -d
#   僅啟動乾坤: docker compose -f docker-compose.nemoclaw.yml up -d ck-missive
#   查看狀態:  docker compose -f docker-compose.nemoclaw.yml ps
#
# 前提：docker-compose.infra.yml 的 PostgreSQL/Redis/Ollama/vLLM 已在運行
#
# Version: 1.0.0
# =============================================================================

services:

  # ─── NemoClaw 監控塔 ───
  # 角色：沙箱控制 · 安全邊界 · 插件註冊 · 自覺層
  # 目前以 config-only 模式運行（策略檔案 mount），未來可獨立成服務
  nemoclaw:
    image: nginx:alpine
    container_name: nemoclaw_tower
    volumes:
      - ./nemoclaw/sandbox/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nemoclaw/sandbox:/etc/nemoclaw/sandbox:ro
      - ./nemoclaw/config:/etc/nemoclaw/config:ro
      - ./nemoclaw/agents:/etc/nemoclaw/agents:ro
    ports:
      - "9000:80"
    networks:
      - nemoclaw_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      nemoclaw.role: "tower"
      nemoclaw.description: "NemoClaw 監控塔 — 沙箱策略配置中心"

  # ─── CK_Missive 業務插件 ───
  # 角色：公文領域智能引擎 (NemoClaw 代理人)
  ck-missive:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ck_missive_app
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ck_admin:ck_password@ck_missive_postgres_dev:5432/ck_missive
      - REDIS_URL=redis://ck_missive_redis_dev:6379/0
      - OLLAMA_BASE_URL=http://ck_missive_ollama_dev:11434
      - VLLM_BASE_URL=http://ck_missive_vllm_dev:8000/v1
      - VLLM_ENABLED=true
    volumes:
      - ../docs:/app/docs:ro
    networks:
      - nemoclaw_net
      - app_network
    depends_on:
      nemoclaw:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      nemoclaw.role: "plugin"
      nemoclaw.plugin: "ck-missive"
      nemoclaw.description: "公文管理 NemoClaw 代理人"

  # ─── OpenClaw 通用引擎 (預留) ───
  # 角色：多頻道 Agent 管線
  # 啟用方式：docker compose -f docker-compose.nemoclaw.yml --profile openclaw up -d
  # openclaw:
  #   build:
  #     context: ../CK_OpenClaw
  #     dockerfile: Dockerfile
  #   container_name: openclaw_engine
  #   ports:
  #     - "18789:18789"
  #   environment:
  #     - CK_MISSIVE_API_URL=http://ck_missive_app:8001
  #   networks:
  #     - nemoclaw_net
  #   depends_on:
  #     nemoclaw:
  #       condition: service_healthy
  #   profiles:
  #     - openclaw
  #   labels:
  #     nemoclaw.role: "engine"
  #     nemoclaw.description: "OpenClaw 多頻道通用引擎"

networks:
  nemoclaw_net:
    name: nemoclaw_network
    driver: bridge
  app_network:
    external: true
    name: ck_missive_app_network
