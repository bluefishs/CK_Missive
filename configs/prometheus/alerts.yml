# CK_Missive Prometheus Alert Rules
#
# Version: 1.0.0 (2026-04-22, ADR-0028 error budget 落地)
#
# 用法：
#   Prometheus server 的 rule_files: 加入此檔路徑。
#   Alertmanager 依 severity label 路由：critical → 即時；warning → 批次。
#
# 設計原則（ADR-0028 錯誤合約化）：
#   - error_budget 群組：單一 endpoint / tool / provider 10min error rate > 5%
#   - silent_failure 群組：已知 silent failure pattern 偵測
#   - capacity 群組：資源耗盡前警示
#   - business 群組：業務路徑失效（晨報 / 推播 / Hermes baseline）

groups:
  # ==========================================================================
  # Error Budget — ADR-0028 錯誤合約化
  # ==========================================================================
  - name: error_budget
    interval: 30s
    rules:
      - alert: HttpEndpointErrorBudgetBurn
        expr: |
          (
            sum by (path) (rate(http_requests_total{status_code=~"5.."}[10m]))
            /
            sum by (path) (rate(http_requests_total[10m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          component: http
        annotations:
          summary: "Endpoint {{ $labels.path }} 10min 錯誤率 > 5%"
          description: |
            {{ $labels.path }} 過去 10 分鐘 5xx 錯誤率為 {{ $value | humanizePercentage }}，
            超過 error budget 門檻（5%）。檢查 JSON log / trace 找根因。

      - alert: HttpEndpointLatencyP95High
        expr: |
          histogram_quantile(0.95,
            sum by (path, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 8
        for: 10m
        labels:
          severity: warning
          component: http
        annotations:
          summary: "Endpoint {{ $labels.path }} P95 latency > 8s"
          description: |
            {{ $labels.path }} P95 延遲 {{ $value | humanizeDuration }}，
            超過使用者體驗下限（ADR-0028）。

      - alert: InferenceProviderErrorBudget
        expr: |
          (
            sum by (provider) (rate(inference_rate_limits_total[10m]))
            /
            sum by (provider) (rate(inference_completions_total[10m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          component: inference
        annotations:
          summary: "Provider {{ $labels.provider }} rate limit > 5%"
          description: |
            {{ $labels.provider }} 過去 10 分鐘 rate-limit 比例 {{ $value | humanizePercentage }}；
            檢查 token tracker / fallback 是否正常。

  # ==========================================================================
  # Silent Failure — 已知 pattern
  # ==========================================================================
  - name: silent_failure
    interval: 30s
    rules:
      - alert: AdminPushConsecutiveFailures
        expr: admin_push_consecutive_fails >= 3
        for: 1m
        labels:
          severity: critical
          component: admin_push
        annotations:
          summary: "通道 {{ $labels.channel }} 連續推播失敗 {{ $value }} 次"
          description: |
            Admin push {{ $labels.channel }} 連續失敗 ≥ 3 次，用戶可能錯過晨報 / 告警。
            檢查 logs/admin_push_failures.log。

      - alert: DbPoolTimeoutSpike
        expr: rate(db_pool_timeout_total[5m]) > 0.01
        for: 3m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "DB pool timeout 觸發（5m rate {{ $value }}/s）"
          description: |
            asyncpg pool 獲取 connection 超時。可能是：
            1) 並發高於 pool size（檢查 db_pool_active vs db_pool_size）
            2) 長查詢卡住 connection（檢查 db_slow_query_total）
            3) ADR-0021 race condition 回歸

      - alert: ProviderCircuitOpen
        # R6 (v6.9 / 2026-05-09): provider_circuit_breaker enhancement
        # 任一 provider 進入 OPEN 狀態（連續 5 次失敗於 60s 內）持續 ≥ 3min
        # → 該 provider 暫時被 skip，依賴 fallback chain 提供服務
        # State encoding: 0=closed, 1=half_open, 2=open
        expr: |
          provider_circuit_state == 2
        for: 3m
        labels:
          severity: warning
          component: inference
        annotations:
          summary: "Provider {{ $labels.provider }} circuit OPEN — 自動 skip 中"
          description: |
            {{ $labels.provider }} 連續失敗達 threshold，circuit breaker 開啟，
            未來請求自動 skip 走 fallback chain（節省每次 retry 的 ~5–30s 浪費）。
            預期 5min cooldown 後自動 HALF_OPEN 試一次。
            檢查根因：tail -f logs/backend-error.log | grep "{{ $labels.provider }}.*失敗"
            手動 reset：python -c "from app.core.provider_circuit_breaker import get_circuit_breaker; get_circuit_breaker().reset('{{ $labels.provider }}')"

      - alert: InferenceFallbackBurst
        expr: |
          sum by (from_provider, to_provider) (rate(inference_fallback_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          component: inference
        annotations:
          summary: "{{ $labels.from_provider }} → {{ $labels.to_provider }} fallback 頻繁"
          description: |
            過去 5 分鐘 fallback 速率 {{ $value }}/s。
            主 provider 可能異常或 rate-limited；確認是否需切換主 provider。
            # P0-D (5/19): 修 metric name drift `inference_fallbacks_total` → `inference_fallback_total`
            # (counter 真名單數，alert 原寫複數 — silent dead alert 同 L29 dict-key drift 反模式)

      # P0-D (2026-05-19): all-providers-OPEN canned fallback 終態
      # 當 Groq/NVIDIA/Ollama 三 provider 全失敗時，會走 _generate_fallback_response
      # 回傳 6 關鍵字罐頭回應 — 用戶體驗 = AI 不可用，必須立即告警。
      # 補 R4 silent gap（5/15 揭發後 4 天未動）+ ADR-0030 GO/NO-GO 信號穿透盲區。
      - alert: InferenceCannedFallback
        expr: |
          sum(rate(inference_fallback_total{to_provider="canned"}[5m])) > 0
        for: 1m
        labels:
          severity: critical
          component: inference
        annotations:
          summary: "AI 全 provider 斷線 — 走罐頭回應（用戶體驗已劣化）"
          description: |
            過去 5 分鐘有 {{ $value }}/s 次 all-providers-OPEN 終態觸發 _generate_fallback_response。
            用戶會看到「AI 服務暫時不可用」預設訊息。
            檢查：Groq 配額 + NVIDIA NIM + Ollama GPU semaphore + provider_circuit_breaker 狀態。
            手動 reset 全 CB：python -c "from app.core.provider_circuit_breaker import get_circuit_breaker; cb=get_circuit_breaker(); [cb.reset(p) for p in ['groq','nvidia','ollama']]"

      - alert: MetricsPopulateErrors
        # R3 (v6.9 / 2026-05-08)：解 v3.0 洞察 11
        # /metrics endpoint per-scrape populate 失敗會被記到此 counter。
        # source 標籤：sys (F27 五系統指標) / shadow_baseline (F26 GO/NO-GO baseline)
        # 任一 source 5min rate > 0.01/s（每分鐘 ≥ 0.6 次失敗）即報警，
        # 防止「commit 顯示綠、metrics 看似 scrape 成功、實際 populate silent skip」反模式。
        expr: |
          sum by (source) (rate(metrics_populate_errors_total[5m])) > 0.01
        for: 3m
        labels:
          severity: critical
          component: observability
        annotations:
          summary: "/metrics populate 失敗（source={{ $labels.source }}, rate={{ $value }}/s）"
          description: |
            5/04 F26+F27 雙重 silent fail 事故防範。
            shadow_baseline source 失敗直接影響 ADR-0030 Hermes GO/NO-GO 5/20 投票。
            sys source 失敗代表系統 5 metric (app_info/up/db_healthy/mem/cpu) 看不到。
            檢查：tail -f logs/backend-error.log | grep "metric populate failed"

  # ==========================================================================
  # Capacity — 資源耗盡預警
  # ==========================================================================
  - name: capacity
    interval: 30s
    rules:
      - alert: DbPoolHighUtilization
        expr: (db_pool_active / db_pool_size) > 0.9
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "DB pool 使用率 > 90%"
          description: |
            pool active {{ $value | humanizePercentage }}。
            可能是流量高峰或 connection 未正確釋放。

      - alert: DbPoolOverflowActive
        expr: db_pool_overflow_active > 5
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "DB pool overflow connections > 5"
          description: |
            已有 {{ $value }} 個 overflow 連線；pool size 可能需調大。

      - alert: HighActiveRequests
        expr: http_requests_active > 50
        for: 3m
        labels:
          severity: warning
          component: http
        annotations:
          summary: "活躍 HTTP 請求 > 50"
          description: "可能流量突增或慢請求堆積；檢查 p95 latency。"

  # ==========================================================================
  # Business — 業務路徑失效
  # ==========================================================================
  - name: business
    interval: 60s
    rules:
      - alert: ShadowBaselineStalled
        expr: |
          shadow_baseline_rows_total{lookback_hours="24"} < 10
        for: 30m
        labels:
          severity: warning
          component: hermes
        annotations:
          summary: "Hermes Shadow baseline 24h 筆數 < 10"
          description: |
            近 24 小時 shadow baseline 累積不足 10 筆。
            檢查 synthetic-baseline-inject 排程是否正常（預期 3x/日 × 24 queries ≈ 72/day）。
            若持續 stalled，觸發 ADR-0030 NO-GO 路徑的風險升高。

      - alert: InferenceNoCompletions
        expr: |
          sum(rate(inference_completions_total[10m])) == 0
          and on() hour() > 8 and on() hour() < 22
        for: 15m
        labels:
          severity: critical
          component: inference
        annotations:
          summary: "工作時段內無任何 LLM completion"
          description: |
            8:00~22:00 之間 10 分鐘內無 inference completion。
            系統可能異常或 Ollama/Groq/Gemma 全部失效。

      - alert: SchedulerJobFailure
        expr: increase(scheduler_job_failures_total[1h]) > 0
        for: 5m
        labels:
          severity: warning
          component: scheduler
        annotations:
          summary: "排程器 1h 內 {{ $value }} 次 job 失敗"
          description: |
            檢查 logs/backend-error.log 的 scheduler event；
            已配合 scheduler_alert.py Telegram 告警（ADR-0019）。

  # ==========================================================================
  # v7.0 Integration Quality (M1 — 取代「成熟度 %」)
  # 5/04 v3.0 覆盤洞察 14：4 個指標衡量真實整合品質
  # ==========================================================================
  - name: v7_integration_quality
    interval: 5m
    rules:
      - alert: V7ChannelDiversityLow
        expr: v7_channel_diversity < 2
        for: 14d
        labels:
          severity: warning
          component: integration
        annotations:
          summary: "跨通道多樣性連 14 天 < 2 (僅 {{ $value }} 通道有 diary)"
          description: |
            v7.0 指標 1：跨通道 pattern 多樣性 = {{ $value }}（目標 ≥ 4）。
            意味 telegram/discord/web 等通道 14 天無對話寫入 diary。
            可能 hermes channel passthrough 斷鏈，或單一通道用戶。
            檢查：scripts/checks/v7_metrics_report.py

      - alert: V7DiaryReferenceDensityLow
        expr: v7_reference_density_diary_pct < 30
        for: 7d
        labels:
          severity: warning
          component: integration
        annotations:
          summary: "Diary entity-tag 連 7 天 < 30% (現 {{ $value }}%)"
          description: |
            v7.0 指標 2a：diary 含 KG entity 比例過低。
            v3.0 review 識別此為「KG↔Memory Wiki 弱」裂縫。
            修法：planner inject 階段加 entity tag annotation。

      - alert: V7SoulDriftHigh
        # 2026-06-12 語意重定義：核心人格不變量跨層缺口（非整檔行數差）。
        # >0 = 有核心底線（倫理紅線/三信念/身份/反迴聲）未跨層一致。-1 排除（unknown）。
        expr: v7_soul_drift_lines > 0
        for: 1d
        labels:
          severity: warning
          component: cross_repo
        annotations:
          summary: "SOUL 核心不變量缺口 {{ $value }}（Missive 有、Hermes 缺）"
          description: |
            v7.0 指標 3（重定義）：跨層該一致的核心人格不變量（倫理紅線/三信念/身份/反迴聲）
            在 Hermes SOUL 缺漏。LINE/TG 用戶的坤哥未必帶同一道德底線。
            修法：把缺漏核心段補進 CK_Hermes SOUL（見 docs/architecture/HERMES_SOUL_CORE_INVARIANT_PLAN）。
            修法：bash scripts/sync/sync_soul_to_hermes.sh --apply

      - alert: V7CritiqueReferenceDensityLow
        expr: v7_reference_density_critique_pct < 70
        for: 14d
        labels:
          severity: warning
          component: integration
        annotations:
          summary: "Critique entity 連 14 天 < 70% (現 {{ $value }}%)"
          description: |
            v7.0 指標 2b：critique 含 entity tag 比例過低。
            v6.4 commit caf814de I3 已加 entity 自動 tag，
            若此 alert 觸發代表 critic 流程斷或 NER 失效。

      - alert: V7ProviderFidelityGapHigh
        expr: v7_provider_fidelity_gap_pct{aggregation="24h_avg"} > 15
        for: 24h
        labels:
          severity: warning
          component: provider_fidelity
        annotations:
          summary: "Provider fidelity gap {{ $value }}pp > 15 (連 24h)"
          description: |
            v7.0 指標 4：跨 provider 人格遵循度差距過大。
            ollama/groq/nvidia 中至少兩 provider 的 SOUL fidelity 差距 > 15pp。
            可能 fallback chain 切換導致用戶體驗大幅波動。
            診斷：python scripts/checks/soul-fidelity-eval.py
            log: wiki/memory/evolutions/fidelity_log.jsonl

  # ==========================================================================
  # ADR-0022 Memory Wiki Freshness（半接通防範）
  # 來源：ADR_HALF_WIRED_AUDIT_20260506 — ADR-0022 列為 L4
  # 寫入鏈路 dormant 風險 — diary 多天 0 寫入難察覺
  # ==========================================================================
  - name: memory_wiki_freshness
    interval: 1h
    rules:
      - alert: MemoryDiaryStale
        expr: |
          (time() - max_over_time(memory_diary_appends_total[7d:1h])) > 86400 * 2
          OR memory_diary_appends_total == 0
        for: 6h
        labels:
          severity: warning
          component: memory_wiki
        annotations:
          summary: "Memory diary 連續 ≥ 2 天無寫入"
          description: |
            ADR-0022 自進化系統的 diary 寫入鏈可能斷裂。
            檢查 backend log: pattern_extractor / agent_post_processing diary 寫入錯誤。
            修法：python scripts/checks/memory_diary_freshness_check.py
            參考：wiki/memory/failures/failure-adr-0025-rls-half-wired.md（同類事故 dormant pattern）

      - alert: MemoryPatternStale
        expr: |
          (time() - max_over_time(memory_patterns_appends_total[14d:1h])) > 86400 * 7
        for: 12h
        labels:
          severity: warning
          component: memory_wiki
        annotations:
          summary: "Memory patterns 連續 ≥ 7 天無新增"
          description: |
            pattern_extractor cron（每日 04:00）可能斷或 trace 太少觸不到 promote 閾值。
            檢查 scheduler logs + agent_query_traces 7d count。

      - alert: MemoryCritiqueStale
        expr: |
          (time() - max_over_time(memory_critiques_appends_total[14d:1h])) > 86400 * 7
        for: 12h
        labels:
          severity: info
          component: memory_wiki
        annotations:
          summary: "Memory critique 連續 ≥ 7 天無新增"
          description: |
            agent_critic 二審流程可能未啟動或 critic 沒觸發任何 critique。
            這是 v6.4 I3 commit caf814de 後的關鍵閉環，silent stale = 學習鏈斷。

      - alert: DiaryAppendFailures
        # R7 (v6.9 / 2026-05-08)：解 v3.0 洞察 11 silent skip 反模式
        # diary_service.append_entry 原 fire-and-forget，失敗只 log warning
        # 改：失敗類型獨立計數（file_io / wiki_lookup / metric_inc / unknown）
        # 5min rate > 0.05/s（每分鐘 ≥ 3 次失敗）即報警
        expr: |
          sum by (error_type) (rate(memory_diary_append_failures_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          component: memory_wiki
        annotations:
          summary: "Diary append 失敗（{{ $labels.error_type }} rate={{ $value }}/s）"
          description: |
            ADR-0022 自進化系統的 diary 寫入鏈失敗率異常。
            error_type:
              - file_io: 檔案系統 transient 錯誤（已 retry 1 次仍失敗）
              - wiki_lookup: wiki search 服務異常（不阻寫入但記錄）
              - metric_inc: prometheus counter 註冊損壞
              - unknown: 其他（檢查 backend log exc_info）
            修法：tail -f logs/backend-error.log | grep "Diary append failed"
