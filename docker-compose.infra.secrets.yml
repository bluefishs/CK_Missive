# =============================================================================
# Docker Compose Override — File-based Secrets (Phase 1)
# =============================================================================
# Usage:
#   docker compose -f docker-compose.infra.yml -f docker-compose.infra.secrets.yml up -d
#
# Prerequisites:
#   1. secrets/postgres_password.txt exists (from .env POSTGRES_PASSWORD)
#   2. secrets/cloudflare_tunnel_token.txt exists (from .env CLOUDFLARE_TUNNEL_TOKEN)
#
# See docs/DOCKER_SECRETS_PHASE1.md for full migration plan.
# =============================================================================

services:
  postgres:
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_pw
    secrets:
      - pg_pw

secrets:
  pg_pw:
    file: ./secrets/postgres_password.txt
