# =============================================================================
# CK_Missive - 基礎設施專用 Docker Compose
# =============================================================================
# 目標：僅運行 PostgreSQL + Redis，搭配 PM2 管理應用服務（混合開發模式）
#
# 使用方式：
#   啟動基礎設施:  docker compose -f docker-compose.infra.yml up -d
#   停止基礎設施:  docker compose -f docker-compose.infra.yml down
#   查看狀態:      docker compose -f docker-compose.infra.yml ps
#
# 搭配 PM2:
#   pm2 start ecosystem.config.js
#
# 或使用統一腳本:
#   .\scripts\dev-start.ps1
#
# Version: 1.0.0
# Created: 2026-02-09
# =============================================================================

name: ${COMPOSE_PROJECT_NAME}_infra

services:
  # --- PostgreSQL 資料庫服務 ---
  postgres:
    image: pgvector/pgvector:0.8.0-pg15
    container_name: ${COMPOSE_PROJECT_NAME}_postgres_dev
    env_file: .env
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./configs/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./configs/postgresql-tuning.conf:/etc/postgresql/tuning.conf:ro
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_lock_waits=on"
      - "-c"
      - "log_temp_files=0"
      - "-c"
      - "default_statistics_target=200"
      - "-c"
      - "timezone=Asia/Taipei"
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis 快取服務 ---
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_redis_dev
    ports:
      - "${REDIS_HOST_PORT}:${REDIS_CONTAINER_PORT}"
    volumes:
      - redis_dev_data:/data
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- 🤖 Ollama AI 服務 (Embedding + Chat) ---
  # GPU 加速：需要 NVIDIA GPU + nvidia-container-toolkit
  # 無 GPU 環境：使用 docker-compose.infra.cpu.yml override 或移除 deploy.resources.reservations.devices
  ollama:
    image: ollama/ollama:latest
    container_name: ${COMPOSE_PROJECT_NAME}_ollama_dev
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=30m
    volumes:
      - ollama_dev_data:/root/.ollama
    networks:
      - app_network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 12G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --- 🧠 vLLM 本地推理服務 (取代 NIM TRT-LLM) ---
  # 原因：NIM 1.8.3 自動選擇 TRT-LLM，RTX 4060 8GB 無法完成 engine build
  # vLLM 直接提供 OpenAI-compatible API，啟動快、VRAM 效率高
  # 啟動：docker compose -f docker-compose.infra.yml --profile vllm up -d vllm
  # VRAM 策略：vLLM ~5GB + Ollama embedding 0.6GB = 5.6GB / 8GB RTX 4060
  #   → Ollama chat 模型 (qwen3:4b 3.3GB) 會在 vLLM 啟動後自動卸載 (KEEP_ALIVE 到期)
  vllm:
    image: vllm/vllm-openai:latest
    container_name: ${COMPOSE_PROJECT_NAME}_vllm_dev
    ports:
      - "${VLLM_HOST_PORT:-8000}:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - vllm_dev_cache:/root/.cache/huggingface
    networks:
      - app_network
    restart: unless-stopped
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      --dtype bfloat16
      --max-model-len 4096
      --gpu-memory-utilization 0.85
      --port 8000
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 12G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    profiles:
      - vllm

# --- 持久化儲存（與 docker-compose.dev.yml 共享） ---
volumes:
  postgres_dev_data:
    name: ${COMPOSE_PROJECT_NAME}_postgres_dev_data
  redis_dev_data:
    name: ${COMPOSE_PROJECT_NAME}_redis_dev_data
  ollama_dev_data:
    name: ${COMPOSE_PROJECT_NAME}_ollama_dev_data
  vllm_dev_cache:
    name: ${COMPOSE_PROJECT_NAME}_vllm_dev_cache

# --- 網路配置（與 docker-compose.dev.yml 共享） ---
networks:
  app_network:
    name: ck_missive_network
    driver: bridge
  nemoclaw_network:
    external: true
    name: nemoclaw_network
